formatting_idiom: "Coding-only specialist: give it repo-scale context (262k is its design point), explicit engineering standards, and tests. Moonshot says use K2.6 for general writing/analysis — don't route non-code here."
structured_output: "No response_format documented on this endpoint — tool-call-based extraction is the reliable path; validate + retry."
strengths: [long-horizon coding agents, MCP Mark Verified 81.1 (beats Opus 4.8's 76.4 there), instruction reliability over extended contexts, open weights, highspeed variant (~180-260 tok/s) available]
failure_modes:
  - headline benchmarks are Moonshot-proprietary; not submitted to independent DeepSWE — verify on your own suite

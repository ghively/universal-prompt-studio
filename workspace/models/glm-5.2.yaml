params: { effort: true, verbosity: false, temperature: true, logprobs: true }
sampling:
  default_temperature: 1.0
  notes: "Official: temp 1.0 default (range 0-1); for stable/technical work drop top_p to 0.8 — ADJUST ONE KNOB ONLY, never both. OpenRouter ($0.93/$3.00) is cheaper than Z.ai first-party ($1.40/$4.40, cache $0.26). ~750B MoE / 40B active, MIT license, no long-context surcharge on 1M."
reasoning:
  kind: adaptive
  cot_prompting: neutral
  notes: >-
    thinking enabled by default (auto-decides); CAN be fully disabled — rare among
    2026 frontier reasoners. Native reasoning_effort has SEVEN levels
    (none|minimal|low|medium|high|xhigh|max, default max) but OpenRouter maps only
    high|xhigh — use the native API for full range. clear_thinking:false preserves
    reasoning across turns; preserved blocks must match byte-exact (footgun).
formatting_idiom: "Docs want complete project context: full codebases for architecture work, explicit refactor boundaries + success criteria, team standards (lint/build/test commands), logs/screenshots for debugging. For coding agents: stream=true + tool_stream=true."
structured_output: "response_format json_object only (no json_schema in the API ref) — also demand JSON in the prompt. Tool calling up to 128 functions."
strengths: ["#1 open-weights on AA Intelligence Index v4.1 (51)", SWE-bench Pro 62.1, Terminal-Bench 2.1 81.0 (Opus 4.8: 85), within ~1% of Opus 4.8 on FrontierSWE, on the intelligence-vs-cost Pareto frontier, 1M ctx + 128K out]
failure_modes:
  - MOST VERBOSE leading model: ~141M tokens (95% reasoning) on AA index, 1.8x average, ~43k output tokens/task — per-task cost far above per-token sticker
  - byte-exact reasoning preservation requirement when clear_thinking=false
prompting_notes: |
  - The open-weights flagship pick; budget by tokens-per-task, not price-per-token.
  - Use effort medium/low via native API for routine work to tame verbosity.

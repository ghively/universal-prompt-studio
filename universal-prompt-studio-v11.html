  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    html.dark body { background: #111827; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); } }
    .toast-enter { animation: toastIn 0.3s ease-out; }
    .toast-exit { animation: toastOut 0.3s ease-in forwards; }
    /* Dark mode input overrides */
    .dark input, .dark textarea, .dark select { border-color: #4b5563; background-color: #374151; color: #f3f4f6; }
    .dark input::placeholder, .dark textarea::placeholder { color: #9ca3af; }
  </style>
</head>

    // Safe clipboard utility with fallback for file:// protocol
    const safeClipboardWrite = async (text) => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (e) { /* fall through to fallback */ }
      // Fallback using execCommand
      try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        return true;
      } catch (e) {
        console.error('Copy to clipboard failed:', e);
        return false;
      }
    };

    // === TOAST NOTIFICATION SYSTEM ===
    let _toastId = 0;
    const toastBus = {
      listeners: [],
      subscribe(fn) { this.listeners.push(fn); return () => { this.listeners = this.listeners.filter(l => l !== fn); }; },
      emit(msg, type = 'success') { this.listeners.forEach(fn => fn({ id: ++_toastId, msg, type })); }
    };
    const showToast = (msg, type = 'success') => toastBus.emit(msg, type);

    function ToastContainer() {
      const [toasts, setToasts] = React.useState([]);
      useEffect(() => {
        return toastBus.subscribe(toast => {
          setToasts(prev => [...prev, toast]);
          setTimeout(() => setToasts(prev => prev.map(t => t.id === toast.id ? { ...t, exiting: true } : t)), 2700);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== toast.id)), 3000);
        });
      }, []);
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500 text-gray-900' };
      if (!toasts.length) return null;
      return (
        <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2">
          {toasts.map(t => (
            <div key={t.id} className={`${colors[t.type] || colors.success} ${t.exiting ? 'toast-exit' : 'toast-enter'} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium max-w-sm`}>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    // === DARK MODE ===
    // Reliable Escape-to-close for modals: a document-level listener that fires
    // regardless of where focus is (the inline onKeyDown handlers only fire when
    // focus is already inside the modal).
    const useEscapeKey = (active, onEscape) => {
      useEffect(() => {
        if (!active) return;
        const handler = (e) => { if (e.key === 'Escape') onEscape(); };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [active, onEscape]);
    };

    const useDarkMode = () => {
      const [mode, setModeState] = useState(() => { try { return localStorage.getItem('promptStudioTheme') || 'system'; } catch(e) { return 'system'; } });
      const [isDark, setIsDark] = useState(false);
      const applyTheme = useCallback((m) => {
        const dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        setIsDark(dark);
        document.documentElement.classList.toggle('dark', dark);
      }, []);
      useEffect(() => { applyTheme(mode); }, [mode, applyTheme]);
      useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const handler = () => { if (mode === 'system') applyTheme('system'); };
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, [mode, applyTheme]);
      const setMode = useCallback((m) => { setModeState(m); try { localStorage.setItem('promptStudioTheme', m); } catch(e) {} }, []);
      return [isDark, mode, setMode];
    };

    function ThemeToggle({ mode, setMode }) {
      const next = mode === 'light' ? 'dark' : mode === 'dark' ? 'system' : 'light';
      const label = mode === 'light' ? '☀️' : mode === 'dark' ? '🌙' : '💻';
      return (
        <button onClick={() => setMode(next)} className="p-2 rounded-lg hover:bg-white/20 text-sm" title={`Theme: ${mode} (click for ${next})`}>
          {label}
        </button>
      );
    }

    // Industry groupings (static, extracted to module scope for performance)
    const INDUSTRY_GROUPS = {

      '📈 Business & Marketing': ['Digital Marketing','Copywriting','Product Management','Business Analysis','Project Management','Sales'],

      '🔬 Science & Research': ['Data Science','Research & Academia','Neuroscience / Psych'],
    };

    // Safe localStorage write with quota handling
    const safeLocalStorageSet = (key, value) => {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (e) {
        console.error('localStorage write failed:', e);
        showToast('Storage is full. Please delete some saved templates or chains to free up space.', 'error');
        return false;
      }
    };

    // Validate chain steps loaded from storage
    const validateChainSteps = (steps) => {
      if (!Array.isArray(steps) || steps.length === 0) return null;
      const requiredKeys = ['id', 'name', 'type'];
      const valid = steps.every(s => s && typeof s === 'object' && requiredKeys.every(k => k in s));
      if (!valid) return null;
      return steps.map(s => ({
        id: s.id,
        name: s.name || `Step ${s.id}`,
        type: s.type || 'standard',
        role: s.role || '',
        task: s.task || '',
        inputSource: s.inputSource || 'manual',
        inputData: s.inputData || '',
        outputLabel: s.outputLabel || `step_${s.id}_output`,
        targets: Array.isArray(s.targets) ? s.targets : [],
        customTarget: s.customTarget || '',
      }));
    };

    const CHAIN_TARGETS = [
      'Canva', 'Figma', 'Google Stitch', 'Adobe XD', 'Framer', 'Webflow', 'Sketch', 'Affinity Designer',
      'GitHub', 'Vercel', 'Netlify', 'Supabase', 'Firebase', 'WordPress',
      'Notion', 'Airtable', 'Google Docs', 'Google Sheets', 'Shopify',
      'n8n', 'Zapier', 'MindStudio', 'HuggingFace', 'Slack',
    ];

    function ChainBuilder({ onBack, themeMode, setThemeMode }) {
      const emptyStep = (id) => ({
        id, name: `Step ${id}`, type: 'standard',
        role: '', task: '', inputSource: 'manual', inputData: '',
        outputLabel: `step_${id}_output`,
        targets: [], customTarget: '',
      });

      const [steps, setSteps] = useState([emptyStep(1), emptyStep(2)]);
      const [showExport, setShowExport] = useState(false);
      const [chainName, setChainName] = useState('');
      const [savedChains, setSavedChains] = useState(() => {
        try { return JSON.parse(localStorage.getItem('promptStudioChains') || '{}'); } catch { return {}; }
      });

      const nextId = () => steps.length === 0 ? 1 : Math.max(...steps.map(s => s.id)) + 1;

      const addStep = (type = 'standard') => {
        const id = nextId();
        setSteps(prev => [...prev, { ...emptyStep(id), type, name: type === 'translate' ? 'Translate' : `Step ${id}` }]);
      };

      const removeStep = (id) => setSteps(prev => prev.filter(s => s.id !== id));

      const updateStep = (id, field, value) =>
        setSteps(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));

      const toggleTarget = (stepId, target) => {
        setSteps(prev => prev.map(s => {
          if (s.id !== stepId) return s;
          const targets = s.targets.includes(target) ? s.targets.filter(t => t !== target) : [...s.targets, target];
          return { ...s, targets };
        }));
      };

      const moveStep = (id, dir) => {
        setSteps(prev => {
          const idx = prev.findIndex(s => s.id === id);
          const next = [...prev];
          const swap = idx + dir;
          if (swap < 0 || swap >= next.length) return prev;
          [next[idx], next[swap]] = [next[swap], next[idx]];
          return next;
        });
      };

      const buildChainJSON = () => {
        const chain = steps.map((s, i) => {
          const obj = {
            step: i + 1,
            name: s.name,
            type: s.type,
            role: s.role || undefined,
            task: s.task || undefined,
            input_source: s.inputSource === 'manual' ? 'manual' : steps.find(x => String(x.id) === String(s.inputSource))?.outputLabel || s.inputSource,
            input_data: s.inputSource === 'manual' && s.inputData ? s.inputData : undefined,
            output_label: s.outputLabel,
          };
          if (s.type === 'translate') {
            const allTargets = [...s.targets, ...(s.customTarget ? s.customTarget.split(',').map(t => t.trim()).filter(Boolean) : [])];
            obj.targets = allTargets;
          }
          // strip undefined
          Object.keys(obj).forEach(k => obj[k] === undefined && delete obj[k]);
          return obj;
        });
        return JSON.stringify({ chain }, null, 2);
      };

      const saveChain = () => {
        if (!chainName.trim()) return;
        if (savedChains[chainName] && !confirm(`A chain named "${chainName}" already exists. Overwrite it?`)) return;
        const updated = { ...savedChains, [chainName]: { steps, savedAt: new Date().toISOString() } };
        if (safeLocalStorageSet('promptStudioChains', updated)) {
          setSavedChains(updated);
          setChainName('');
        }
      };

      const copyChain = async () => {
        const ok = await safeClipboardWrite(buildChainJSON());
        if (ok) showToast('Chain JSON copied to clipboard!');
      };

      const downloadChain = () => {
        const blob = new Blob([buildChainJSON()], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `chain-${Date.now()}.json`; a.click();
        URL.revokeObjectURL(url);
      };

      const stepColor = (type) => type === 'translate' ? 'border-orange-400 bg-orange-50 dark:bg-orange-950' : 'border-blue-300 bg-white dark:bg-gray-800';
      const stepBadge = (type) => type === 'translate'

      return (
        <div className="min-h-screen bg-gray-100 dark:bg-gray-900">
          {/* Header */}

                  Export Chain →

            {/* How it works banner */}

                Use <span className="text-blue-600 font-medium">Standard</span> steps for planning and building,
                then add a <span className="text-orange-600 font-medium">Translate</span> step to push the final
                build to multiple target platforms simultaneously.

            {/* Step Cards */}

              <div key={step.id} className={`rounded-xl border-2 shadow-sm overflow-hidden ${stepColor(step.type)}`}>

                  <span className={`px-2 py-1 rounded text-xs font-semibold ${stepBadge(step.type)}`}>
                    {step.type === 'translate' ? '🔀 Translate' : '⚙️ Standard'}

                  <div className="flex gap-1">
                    <button onClick={() => moveStep(step.id, -1)} disabled={idx === 0} aria-label="Move step up"
                      className="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded disabled:opacity-30 text-gray-500 dark:text-gray-400">▲</button>
                    <button onClick={() => moveStep(step.id, 1)} disabled={idx === steps.length - 1} aria-label="Move step down"
                      className="p-1 hover:bg-gray-200 dark:hover:bg-gray-600 rounded disabled:opacity-30 text-gray-500 dark:text-gray-400">▼</button>
                    <button onClick={() => removeStep(step.id)} disabled={steps.length <= 1} aria-label="Remove step"
                      className="p-1 hover:bg-red-100 dark:hover:bg-red-900 rounded disabled:opacity-30 text-red-400 ml-1">✕</button>
                  </div>
                </div>

                <div className="p-4 space-y-4">
                  {/* Input Source */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>

                        className="w-full p-2 border border-gray-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500">
                        <option value="manual">✍️ Manual / Paste input</option>

                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Output Label</label>
                      <input type="text" value={step.outputLabel}

                        }}
                        onFocus={e => { e.target.style.height = 'auto'; e.target.style.height = Math.max(96, e.target.scrollHeight) + 'px'; }}
                        rows={4} placeholder="Paste input data here — e.g. a JSON prompt from the LLM Builder, a brand brief, or any text..."
                        className="w-full p-3 border border-gray-300 rounded-lg text-sm resize-none focus:ring-2 focus:ring-blue-500 font-mono overflow-hidden min-h-24" />
                    </div>
                  )}

                  {/* Role & Task */}
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Role / Persona</label>
                      <textarea value={step.role} onChange={e => updateStep(step.id, 'role', e.target.value)}
                        rows={3} placeholder="e.g. You are a senior UI designer specializing in design systems..."

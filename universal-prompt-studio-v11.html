                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-1">Task Instruction</label>
                      <textarea value={step.task} onChange={e => updateStep(step.id, 'task', e.target.value)}
                        rows={3} placeholder="e.g. Analyze the brief and produce a complete design spec including colors, typography, and spacing rules..."
                        className="w-full p-2 border border-gray-300 rounded-lg text-sm resize-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>

                  {/* Translate targets */}
                  {step.type === 'translate' && (
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase mb-2">
                        Target Platforms <span className="text-orange-500">({step.targets.length} selected)</span>
                      </label>
                      <div className="grid grid-cols-4 gap-2 mb-3">
                        {CHAIN_TARGETS.map(t => (
                          <label key={t} className={`flex items-center gap-2 p-2 border-2 rounded-lg cursor-pointer text-xs transition-colors ${step.targets.includes(t) ? 'border-orange-400 bg-orange-50 dark:bg-orange-950 text-orange-700 dark:text-orange-300 font-semibold' : 'border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>
                            <input type="checkbox" className="rounded" checked={step.targets.includes(t)}
                              onChange={() => toggleTarget(step.id, t)} />
                            {t}
                          </label>
                        ))}
                      </div>
                      <input type="text" value={step.customTarget}
                        onChange={e => updateStep(step.id, 'customTarget', e.target.value)}
                        placeholder="Custom targets (comma-separated, e.g. Framer, internal-design-system)"
                        className="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-orange-400" />
                    </div>
                  )}
                </div>
              </div>
            ))}

            {/* Add Step Buttons */}
            <div className="flex gap-3">
              <button onClick={() => addStep('standard')}
                className="flex-1 py-3 border-2 border-dashed border-blue-300 dark:border-blue-700 text-blue-600 dark:text-blue-400 rounded-xl hover:bg-blue-50 dark:hover:bg-blue-950 font-medium transition-colors">
                + Add Standard Step
              </button>
              <button onClick={() => addStep('translate')}
                className="flex-1 py-3 border-2 border-dashed border-orange-300 dark:border-orange-700 text-orange-600 dark:text-orange-400 rounded-xl hover:bg-orange-50 dark:hover:bg-orange-950 font-medium transition-colors">
                + Add Translate Step
              </button>
            </div>

            {/* Saved Chains */}
            {Object.keys(savedChains).length > 0 && (
              <div className="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm">
                <h3 className="font-semibold text-gray-700 dark:text-gray-200 mb-3">📁 Saved Chains</h3>
                <div className="space-y-2">
                  {Object.entries(savedChains).map(([name, chain]) => (
                    <div key={name} className="flex items-center justify-between bg-gray-50 dark:bg-gray-700 p-3 rounded-lg">
                      <div>
                        <span className="font-medium text-gray-800 dark:text-gray-100">{name}</span>
                        <span className="text-gray-600 dark:text-gray-400 text-xs ml-2">{chain.steps?.length} steps · {new Date(chain.savedAt).toLocaleDateString()}</span>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => { const valid = validateChainSteps(chain.steps); if (valid) setSteps(valid); else showToast('This saved chain has invalid data and cannot be loaded.', 'error'); }}
                          className="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">Load</button>
                        <button onClick={() => { if (!confirm(`Delete chain "${name}"?`)) return; const c = {...savedChains}; delete c[name]; setSavedChains(c); safeLocalStorageSet('promptStudioChains', c); }}
                          className="px-3 py-1 bg-red-400/60 text-white rounded text-sm hover:bg-red-500">Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Export Modal */}
          {showExport && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="export-chain-title" onKeyDown={e => e.key === 'Escape' && setShowExport(false)}>
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden">
                <div className="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex items-center justify-between">
                  <h3 id="export-chain-title" className="text-xl font-bold dark:text-white">🔗 Exported Chain JSON</h3>
                  <button onClick={() => setShowExport(false)} className="text-2xl hover:text-red-500 dark:text-gray-300" aria-label="Close">×</button>
                </div>
                <div className="p-4 overflow-auto max-h-[55vh]">
                  <pre className="bg-gray-900 text-green-400 p-4 rounded-lg text-sm whitespace-pre-wrap">
                    {buildChainJSON()}
                  </pre>
                </div>
                <div className="p-4 bg-gray-50 dark:bg-gray-700 border-t dark:border-gray-600 space-y-3">
                  <div className="flex gap-2">
                    <input type="text" value={chainName} onChange={e => setChainName(e.target.value)}
                      placeholder="Chain name to save..."
                      className="flex-1 p-2 border rounded-lg" />
                    <button onClick={saveChain} disabled={!chainName.trim()}
                      className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50">
                      💾 Save Chain
                    </button>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={copyChain}
                      className="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                      📋 Copy JSON
                    </button>
                    <button onClick={downloadChain}
                      className="flex-1 px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold">
                      📥 Download JSON
                    </button>
                  </div>
                  <p className="text-center text-xs text-gray-600 dark:text-gray-400">Pass this chain JSON to Claude Code or your agent runner to execute each step in sequence.</p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // === COMPONENTS ===

    function UniversalPromptStudio() {
      const [, themeMode, setThemeMode] = useDarkMode();
      const [promptType, setPromptType] = useState(null);
      const [showChain, setShowChain] = useState(false);
      const [currentSection, setCurrentSection] = useState(0);
      const [formData, setFormData] = useState({});
      const [savedTemplates, setSavedTemplates] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('promptStudioTemplates') || '{}');
        } catch { return {}; }
      });
      const [templateName, setTemplateName] = useState('');
      const [showOutput, setShowOutput] = useState(false);
      const [viewingTemplate, setViewingTemplate] = useState(null);
      const [templateViewMode, setTemplateViewMode] = useState('json');
      const [outputMode, setOutputMode] = useState('json'); // 'json' | 'text'
      const [showImport, setShowImport] = useState(false);
      const [importText, setImportText] = useState('');
      const [importError, setImportError] = useState('');
      const [autoSaveData] = useState(() => { try { const s = JSON.parse(localStorage.getItem('promptStudioAutosave')); return s && s.type && s.data && typeof s.data === 'object' && Date.now() - s.timestamp < 86400000 ? s : null; } catch(e) { return null; } });
      const [presetKey, setPresetKey] = useState(0); // for resetting preset dropdown
      const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
      const [fieldSearch, setFieldSearch] = useState(''); // filter fields across all sections
      const [confirmState, setConfirmState] = useState(null); // { message, confirmLabel, danger, resolve }
      const [autoSaveStatus, setAutoSaveStatus] = useState('');
      const isLoadingTemplateRef = useRef(false);
      const templateFileInputRef = useRef(null);

      // Auto-save with 2s debounce
      useEffect(() => {
        if (!promptType || !hasUnsavedChanges) return;
        setAutoSaveStatus('');
        const timer = setTimeout(() => {
          try {
            localStorage.setItem('promptStudioAutosave', JSON.stringify({ type: promptType, data: formData, timestamp: Date.now() }));
            setAutoSaveStatus('Auto-saved');
            setTimeout(() => setAutoSaveStatus(''), 3000);
          } catch (e) { /* ignore quota errors for autosave */ }
        }, 2000);
        return () => clearTimeout(timer);
      }, [formData, promptType, hasUnsavedChanges]);

      const schema = SCHEMAS[promptType];
      const sectionInfo = promptType ? SECTION_INFO[promptType] : {};
      const sections = Object.keys(sectionInfo);

      useEffect(() => {
        if (promptType) {
          // Skip defaults reset when loading a template
          if (isLoadingTemplateRef.current) {
            isLoadingTemplateRef.current = false;
            return;
          }
          const currentSchema = SCHEMAS[promptType];
          const defaults = {};
          Object.entries(currentSchema).forEach(([key, config]) => {
            if (config.default !== undefined) {
              defaults[key] = config.default;
            }
          });
          setFormData(defaults);
          setCurrentSection(0);
          setShowOutput(false);
          setHasUnsavedChanges(false);
          setFieldSearch('');
        }
      }, [promptType]);

      const updateField = useCallback((key, value) => {
        setFormData(prev => ({ ...prev, [key]: value }));
        setHasUnsavedChanges(true);
      }, []);

      // Close modals on Escape from anywhere
      const closeOutput = useCallback(() => setShowOutput(false), []);
      const closeViewing = useCallback(() => setViewingTemplate(null), []);
      const closeImport = useCallback(() => { setShowImport(false); setImportText(''); setImportError(''); }, []);
      useEscapeKey(showOutput, closeOutput);
      useEscapeKey(!!viewingTemplate, closeViewing);
      useEscapeKey(showImport, closeImport);

      // Styled, promise-based replacement for window.confirm()
      const confirmDialog = useCallback((message, opts = {}) => new Promise((resolve) => {
        setConfirmState({ message, confirmLabel: opts.confirmLabel || 'Confirm', danger: !!opts.danger, resolve });
      }), []);
      const resolveConfirm = useCallback((val) => {
        setConfirmState(prev => { if (prev) prev.resolve(val); return null; });
      }, []);
      useEscapeKey(!!confirmState, () => resolveConfirm(false));

      const confirmModal = confirmState && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]" role="dialog" aria-modal="true" onClick={() => resolveConfirm(false)}>
          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-sm w-full p-6" onClick={e => e.stopPropagation()}>
            <p className="text-gray-800 dark:text-gray-100 mb-6">{confirmState.message}</p>
            <div className="flex justify-end gap-2">
              <button onClick={() => resolveConfirm(false)} className="px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-500">Cancel</button>
              <button onClick={() => resolveConfirm(true)} className={`px-4 py-2 rounded-lg text-white font-semibold ${confirmState.danger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`} autoFocus>{confirmState.confirmLabel}</button>
            </div>
          </div>
        </div>
      );

      const applyPreset = useCallback((presetName) => {
        const preset = PRESETS[promptType]?.[presetName];
        if (preset) {
          setFormData(prev => ({ ...prev, ...preset }));
          setHasUnsavedChanges(true);
        }
        setPresetKey(k => k + 1); // reset dropdown
      }, [promptType]);

      const loadTemplate = useCallback((name) => {
        const template = savedTemplates[name];
        if (template) {
          isLoadingTemplateRef.current = true;
          setFormData(template.data);
          setPromptType(template.type);
          setCurrentSection(0);
          setShowOutput(false);
          setHasUnsavedChanges(false);
        }
      }, [savedTemplates]);

      const saveTemplate = useCallback(async () => {
        if (!templateName.trim()) return;
        if (savedTemplates[templateName] && !(await confirmDialog(`A template named "${templateName}" already exists. Overwrite it?`, { confirmLabel: 'Overwrite' }))) return;
        const newTemplates = {
          ...savedTemplates,
          [templateName]: { type: promptType, data: formData, savedAt: new Date().toISOString() }
        };
        if (safeLocalStorageSet('promptStudioTemplates', newTemplates)) {
          setSavedTemplates(newTemplates);
          setTemplateName('');
          setHasUnsavedChanges(false);
          try { localStorage.removeItem('promptStudioAutosave'); } catch(e) {}
          showToast('Template saved!');
        }
      }, [templateName, savedTemplates, promptType, formData, confirmDialog]);

      const deleteTemplate = useCallback(async (name) => {
        if (!(await confirmDialog(`Delete template "${name}"?`, { confirmLabel: 'Delete', danger: true }))) return;
        const newTemplates = { ...savedTemplates };
        delete newTemplates[name];
        setSavedTemplates(newTemplates);
        safeLocalStorageSet('promptStudioTemplates', newTemplates);
      }, [savedTemplates, confirmDialog]);

      // Export the entire template library to a downloadable JSON file (backup/share)
      const exportAllTemplates = useCallback(() => {
        const count = Object.keys(savedTemplates).length;
        if (!count) { showToast('No templates to export', 'error'); return; }
        const payload = { _type: 'promptStudioTemplates', exportedAt: new Date().toISOString(), templates: savedTemplates };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `prompt-studio-templates-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`Exported ${count} template${count === 1 ? '' : 's'}`);
      }, [savedTemplates]);

      // Import a template-library file, merging into the current library (suffixing name collisions)
      const importTemplatesFromFile = useCallback((file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            const incoming = parsed && parsed.templates && typeof parsed.templates === 'object' ? parsed.templates : parsed;
            if (!incoming || typeof incoming !== 'object') throw new Error('bad shape');
            const merged = { ...savedTemplates };
            let added = 0;
            Object.entries(incoming).forEach(([name, tpl]) => {
              if (!tpl || typeof tpl !== 'object' || !tpl.type || !tpl.data) return;
              let key = name;
              while (merged[key]) key = `${key} (imported)`;
              merged[key] = tpl;
              added++;
            });
            if (!added) { showToast('No valid templates found in file', 'error'); return; }
            if (safeLocalStorageSet('promptStudioTemplates', merged)) {
              setSavedTemplates(merged);
              showToast(`Imported ${added} template${added === 1 ? '' : 's'}`);
            }
          } catch (e) {
            showToast('Could not read that file — invalid JSON', 'error');
          }
        };
        reader.readAsText(file);
      }, [savedTemplates]);

      // Reset the current form back to the active schema's defaults
      const resetForm = useCallback(async () => {
        if (!promptType) return;
        if (!(await confirmDialog('Reset all fields to defaults? Unsaved changes will be lost.', { confirmLabel: 'Reset', danger: true }))) return;
        const currentSchema = SCHEMAS[promptType] || {};
        const defaults = {};
        Object.entries(currentSchema).forEach(([key, config]) => {
          if (config.default !== undefined) defaults[key] = config.default;
        });
        setFormData(defaults);
        setHasUnsavedChanges(false);
        showToast('Form reset to defaults');
      }, [promptType, confirmDialog]);

      const buildNestedJSON = useCallback((data) => {
        const schema = SCHEMAS[promptType] || {};
        const result = {};
        Object.entries(data).forEach(([key, value]) => {
          if (value === '' || value === undefined || value === null) return;
          if (Array.isArray(value) && value.length === 0) return;
          if (key.startsWith('_')) return; // skip internal keys like _industries_selected
          // Skip fields hidden by an unmet condition so they don't leak into output
          const cfg = schema[key];
          if (cfg && cfg.condition && !data[cfg.condition]) return;
          const resolved = typeof value === 'string' ? resolveSentinel(value) : value;
          const keys = key.split('.');
          let current = result;
          for (let i = 0; i < keys.length - 1; i++) {
            // Guard: if existing value is not an object, wrap it to avoid conflict
            if (current[keys[i]] !== undefined && (typeof current[keys[i]] !== 'object' || Array.isArray(current[keys[i]]))) {
              current[keys[i]] = { _value: current[keys[i]] };
            }
            current[keys[i]] = current[keys[i]] || {};
            current = current[keys[i]];
          }
          current[keys[keys.length - 1]] = resolved;
        });
        return JSON.stringify(result, null, 2);
      }, [promptType]);

      const generatedJSON = useMemo(() => buildNestedJSON(formData), [formData, buildNestedJSON]);

      const jsonToPlainText = useCallback((jsonStr) => {
        try {
          const obj = JSON.parse(jsonStr);
          const lines = [];
          const flatten = (o, prefix = '') => {
            Object.entries(o).forEach(([k, v]) => {
              const label = (prefix ? `${prefix} › ${k}` : k).replace(/_/g, ' ');
              if (v && typeof v === 'object' && !Array.isArray(v)) flatten(v, prefix ? `${prefix} › ${k}` : k);
              else if (v !== '' && v !== null && v !== undefined && !(Array.isArray(v) && v.length === 0))
                lines.push(`${label}: ${Array.isArray(v) ? v.join(', ') : v}`);
            });
          };
          flatten(obj);
          return lines.join('\n').trim();
        } catch { return jsonStr; }
      }, []);

      const generatedPlainText = useMemo(() => {
        const d = formData;
        const lines = [];
        const add = (label, val) => { if (val && val !== '' && !(Array.isArray(val) && val.length === 0)) lines.push(`${label}: ${Array.isArray(val) ? val.join(', ') : val}`); };
        const head = (title) => { lines.push(''); lines.push(`=== ${title.toUpperCase()} ===`); };

        if (promptType === 'llm') {
          head('Role & Persona');
          add('Persona', d['role.persona']); add('Expertise', d['role.expertise']);
          add('Tone', d['role.tone']); add('Experience Level', d['role.seniority']); add('Point of View', d['role.pov']);

          const skills = [...(Array.isArray(d['skills.picker']) ? d['skills.picker'] : []), ...(d['skills.custom'] ? d['skills.custom'].split(',').map(s=>s.trim()) : [])].filter(Boolean);
          if (skills.length) { head('Skills'); lines.push(`Apply the following skills: ${skills.join(', ')}.`); }

          head('Task');
          add('Instruction', d['task.instruction']); add('Goal', d['task.goal']);
          add('Subtasks', d['task.subtasks']); add('Constraints', d['task.constraints']); add('Urgency', d['task.deadline_pressure']);

          head('Context');
          add('Background', d['context.background']); add('Target Audience', d['context.audience']);
          add('Audience Expertise', d['context.audience_expertise']); add('Domain', d['context.domain']);
          add('Target Integrations', d['context.target_integrations']);
          add('Platform', d['context.platform']); add('Language', d['context.language']);

          if (d['input.data'] || d['input.format'] || d['input.quality']) {
            head('Input');
            add('Data', d['input.data']); add('Format', d['input.format']); add('Data Quality', d['input.quality']);
          }

          head('Output');
          add('Format', d['output.format']); add('Length', d['output.length']);
          add('Language Style', d['output.language_style']); add('Header Usage', d['output.header_usage']);
          add('Code Comments', d['output.code_comments']); add('Structure', d['output.structure']);

          if (d['examples.few_shot'] || d['examples.anti_examples']) {
            head('Examples');
            add('Few-Shot Examples', d['examples.few_shot']); add('Anti-Examples (avoid)', d['examples.anti_examples']);
          }

          head('Behavior');
          add('Reasoning Mode', d['behavior.reasoning_mode']); add('Framework', d['behavior.framework']);
          add('Prioritize', d['behavior.priority']); add('Uncertainty Handling', d['behavior.uncertainty_handling']);
          add('Forbidden Outputs', d['behavior.forbidden_outputs']);
          if (d['behavior.hallucination_guard']) lines.push('Flag any low-confidence claims explicitly.');

          if (d['memory.key_facts'] || d['memory.session_state'] || d['memory.context_window_hint']) {
            head('Memory & Context');
            add('Key Facts', d['memory.key_facts']); add('Session State', d['memory.session_state']);
            add('Long Context Strategy', d['memory.context_window_hint']);
            if (d['memory.persona_persistence']) lines.push('Maintain persona consistently across all turns.');
          }

          if (d['citation.style'] && d['citation.style'] !== 'none') {
            head('Citation');
            add('Citation Style', d['citation.style']); add('Source Preferences', d['citation.source_preference']);
            add('Confidence Labels', d['citation.confidence_labels']); add('URL Behavior', d['citation.url_behavior']);
          }

          if (d['iteration.mode'] && d['iteration.mode'] !== 'single_pass') {
            head('Iteration');
            add('Mode', d['iteration.mode']); add('Revision Trigger', d['iteration.revision_trigger']);
            add('Feedback Style', d['iteration.feedback_style']); add('Max Cycles', d['iteration.max_cycles']);
            if (d['iteration.version_label']) lines.push('Label each output with a version number (v1, v2...).');
          }

          if (d['safety.content_level'] || d['safety.disclaimer'] || (Array.isArray(d['safety.bias_awareness']) && d['safety.bias_awareness'].length)) {
            head('Safety & Guardrails');
            add('Content Level', d['safety.content_level']); add('Bias Checks', d['safety.bias_awareness']);
            add('Disclaimer', d['safety.disclaimer']); add('PII Handling', d['safety.pii_handling']);
            add('Edge Case Behavior', d['safety.edge_case_behavior']);
          }

          head('Advanced Reasoning');
          if (d['advanced.chain_of_thought']) lines.push('Use chain-of-thought reasoning.');
          if (d['advanced.step_by_step']) lines.push('Provide a step-by-step explanation.');
          if (d['advanced.self_critique']) lines.push('Include self-critique and verification of your output.');
          if (d['advanced.output_preview']) lines.push('Begin with a brief plan before producing the full output.');
          add('Creativity Level', d['advanced.temperature_hint']);

        } else {
          // Non-LLM types: flatten nested JSON to readable lines
          const nested = JSON.parse(buildNestedJSON(formData));
          const flatten = (obj, prefix='') => {
            Object.entries(obj).forEach(([k, v]) => {
              const label = (prefix ? `${prefix} › ${k}` : k).replace(/_/g,' ');
              if (typeof v === 'object' && !Array.isArray(v)) flatten(v, prefix ? `${prefix} › ${k}` : k);
              else lines.push(`${label}: ${Array.isArray(v) ? v.join(', ') : v}`);
            });
          };
          flatten(nested);
        }

        return lines.join('\n').trim();
      }, [formData, promptType, buildNestedJSON]);

      const importJSON = () => {
        setImportError('');
        try {
          const parsed = JSON.parse(importText);
          if (typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)) {
            setImportError('Expected a JSON object at the top level.');
            return;
          }
          const FORBIDDEN_KEYS = ['__proto__', 'constructor', 'prototype'];
          const currentSchema = SCHEMAS[promptType];
          const validKeys = new Set(Object.keys(currentSchema));
          const flat = {};
          const flattenObj = (obj, prefix='') => {
            Object.entries(obj).forEach(([k, v]) => {
              if (FORBIDDEN_KEYS.includes(k)) return; // reject prototype pollution
              const fullKey = prefix ? `${prefix}.${k}` : k;
              if (typeof v === 'object' && v !== null && !Array.isArray(v)) flattenObj(v, fullKey);
              else if (validKeys.has(fullKey) || fullKey === 'user_intent') flat[fullKey] = v;
            });
          };
          flattenObj(parsed);
          setFormData(prev => ({ ...prev, ...flat }));
          setShowImport(false);
          setImportText('');
          setHasUnsavedChanges(true);
        } catch(e) {
          setImportError('Invalid JSON — please check your input and try again.');
        }
      };

      const copyToClipboard = async () => {
        const content = outputMode === 'json' ? generatedJSON : generatedPlainText;
        const ok = await safeClipboardWrite(content);
        if (ok) showToast(`${outputMode === 'json' ? 'JSON' : 'Text'} copied to clipboard!`);
      };

      const exportToFile = () => {
        const isJson = outputMode === 'json';
        const content = isJson ? generatedJSON : generatedPlainText;
        const blob = new Blob([content], { type: isJson ? 'application/json' : 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${promptType}-prompt-${Date.now()}.${isJson ? 'json' : 'txt'}`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // Render field based on type
      const renderField = (key, config) => {
        // Check condition
        if (config.condition && !formData[config.condition]) return null;

        const value = formData[key] ?? config.default ?? '';

        switch (config.type) {
          case 'medium_aesthetics': {
            const medium = formData['style.medium'] || 'photography';
            const aestheticOptions = MEDIUM_AESTHETICS[medium] || MEDIUM_AESTHETICS['photography'];
            const selectedAesthetics = Array.isArray(value) ? value : [];
            return (
              <div>
                <p className="text-xs text-gray-600 dark:text-gray-400 mb-2 italic">Options shown for: <span className="font-semibold text-blue-500">{medium.replace(/_/g,' ')}</span> — changes with medium selection above</p>
                <div className="grid grid-cols-3 gap-2">
                  {aestheticOptions.map(opt => (
                    <label key={opt} className={`flex items-center gap-2 p-2 border-2 rounded-lg cursor-pointer text-sm transition-colors ${selectedAesthetics.includes(opt) ? 'border-purple-500 bg-purple-50 dark:bg-purple-950 text-purple-700 dark:text-purple-300 font-medium' : 'border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-200'}`}>
                      <input type="checkbox" className="rounded" checked={selectedAesthetics.includes(opt)}
                        onChange={e => {
                          const next = e.target.checked ? [...selectedAesthetics, opt] : selectedAesthetics.filter(v => v !== opt);
                          updateField(key, next);
                        }} />
                      {opt.replace(/_/g,' ')}
                    </label>
                  ))}
                </div>
                <div className="flex justify-end mt-2">
                  <button onClick={() => updateField(key, [])} className="text-xs text-red-400 hover:underline">Clear</button>
                </div>
              </div>
            );
          }
          case 'industry_skills_picker':
            const selectedIndustries = formData['_industries_selected'] || [];
            const selectedSkills = Array.isArray(formData[key]) ? formData[key] : [];
            const combinedSkills = [...new Set(
              selectedIndustries.flatMap(ind => INDUSTRY_SKILLS[ind] || [])
            )];
            return (
              <div className="space-y-4">
                <div>
                  <p className="text-sm text-gray-500 dark:text-gray-400 mb-3">1. Select industries to load their top 10 skills:</p>
                  {Object.entries(INDUSTRY_GROUPS).map(([groupName, industries]) => (
                    <div key={groupName} className="mb-3">
                      <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">{groupName}</p>
                      <div className="grid grid-cols-2 gap-1.5">
                        {industries.map(ind => (
                          <label key={ind} className={`flex items-center gap-2 p-2 border-2 rounded-lg cursor-pointer text-sm transition-colors ${selectedIndustries.includes(ind) ? 'border-blue-500 bg-blue-50 dark:bg-blue-950 text-blue-700 dark:text-blue-300 font-medium' : 'border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-200'}`}>
                            <input type="checkbox" className="rounded" checked={selectedIndustries.includes(ind)}
                              onChange={e => {
                                const next = e.target.checked ? [...selectedIndustries, ind] : selectedIndustries.filter(i => i !== ind);
                                updateField('_industries_selected', next);
                                const newCombined = [...new Set(next.flatMap(i => INDUSTRY_SKILLS[i] || []))];
                                updateField(key, selectedSkills.filter(s => newCombined.includes(s)));
                              }}
                            />
                            {ind}
                          </label>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                {combinedSkills.length > 0 && (
                  <div>
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-sm text-gray-500 dark:text-gray-400">2. Pick the skills to apply <span className="font-semibold text-blue-600">({selectedSkills.length} selected)</span>:</p>
                      <div className="flex gap-3">
                        <button onClick={() => updateField(key, combinedSkills)} className="text-xs text-blue-600 hover:underline">Select All</button>
                        <button onClick={() => updateField(key, [])} className="text-xs text-red-400 hover:underline">Clear</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-1.5">
                      {combinedSkills.map(skill => (
                        <label key={skill} className={`flex items-center gap-2 p-2 border rounded-lg cursor-pointer text-sm transition-colors ${selectedSkills.includes(skill) ? 'border-green-500 bg-green-50 dark:bg-green-950 text-green-700 dark:text-green-300 font-medium' : 'border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-200'}`}>
                          <input type="checkbox" className="rounded" checked={selectedSkills.includes(skill)}
                            onChange={e => {
                              const next = e.target.checked ? [...selectedSkills, skill] : selectedSkills.filter(s => s !== skill);
                              updateField(key, next);
                            }}
                          />
                          {skill}
                        </label>
                      ))}
                    </div>
                  </div>
                )}
                {combinedSkills.length === 0 && (
                  <p className="text-sm text-gray-600 dark:text-gray-400 italic">← Select at least one industry above to see its skills</p>
                )}
              </div>
            );
          case 'text':
            return (
              <input
                id={`field-${key}`}
                type="text"
                value={value}
                onChange={e => updateField(key, e.target.value)}
                placeholder={config.placeholder}
                className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              />
            );
          case 'number':
            return (
              <input
                id={`field-${key}`}
                type="number"
                value={value}
                onChange={e => { const n = parseFloat(e.target.value); updateField(key, isNaN(n) ? '' : n); }}
                placeholder={config.placeholder}
                min={config.min}
                max={config.max}
                step={config.step || 1}
                className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
              />
            );
          case 'textarea':
            return (
              <textarea
                id={`field-${key}`}
                value={value}
                onChange={e => updateField(key, e.target.value)}
                placeholder={config.placeholder}
                rows={3}
                className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 resize-none"
              />
            );
          case 'select': {
            const schemaOpts = config.options.filter(opt => !SELECT_SENTINELS.includes(opt));
            return (
              <div>
                <select
                  id={`field-${key}`}
                  value={value}
                  onChange={e => {
                    updateField(key, e.target.value);
                    if (key === 'style.medium') updateField('style.medium_aesthetics', []);
                  }}
                  className="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 dark:text-white"
                >
                  {SELECT_SENTINELS.map(s => (
                    <option key={s || '__skip'} value={s} className={s === '' ? 'text-gray-400' : 'italic'}>{SENTINEL_LABELS[s]}</option>
                  ))}
                  {schemaOpts.map(opt => (
                    <option key={opt} value={opt}>{opt.replace(/_/g, ' ')}</option>
                  ))}
                </select>
                {config.placeholder && <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">{config.placeholder}</p>}
              </div>
            );
          }
          case 'multiselect':
            const selected = Array.isArray(value) ? value : [];
            return (
              <div className="grid grid-cols-3 gap-2">
                {config.options.map(opt => (
                  <label key={opt} className="flex items-center gap-2 p-2 border dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer text-sm dark:text-gray-200">
                    <input
                      type="checkbox"
                      checked={selected.includes(opt)}
                      onChange={e => {
                        const newVal = e.target.checked 
                          ? [...selected, opt]
                          : selected.filter(v => v !== opt);
                        updateField(key, newVal);
                      }}
                      className="rounded"
                    />
                    {opt.replace(/_/g, ' ')}
                  </label>
                ))}
              </div>
            );
          case 'checkbox':
            return (
              <label className="flex items-center gap-2 cursor-pointer">
                <input
                  type="checkbox"
                  checked={!!value}
                  onChange={e => updateField(key, e.target.checked)}
                  className="rounded w-5 h-5"
                />
                <span className="dark:text-white">{config.label}</span>
              </label>
            );
          default:
            return null;
        }
      };

      // === TYPE SELECTION SCREEN ===
      if (showChain) return <ChainBuilder onBack={() => setShowChain(false)} themeMode={themeMode} setThemeMode={setThemeMode} />;

      if (!promptType) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 dark:from-gray-950 dark:via-gray-900 dark:to-gray-950 p-8">
            {confirmModal}
            <div className="max-w-4xl mx-auto">
              <div className="text-center mb-12">
                <h1 className="text-4xl font-bold text-white mb-4">Universal Prompt Studio</h1>
                <p className="text-purple-200 text-lg mb-6">Build structured prompts for AI image, video, text, dev, and marketing workflows</p>
                <div className="mb-4">
                  <ThemeToggle mode={themeMode} setMode={setThemeMode} />
                </div>
                <div className="flex items-center justify-center gap-3">
                  <button onClick={() => setShowImport(true)}
                    className="px-5 py-2 bg-white/15 hover:bg-white/25 text-white rounded-lg border border-white/30 text-sm font-medium transition-colors">
                    📂 Import Existing JSON Prompt
                  </button>
                  {autoSaveData && (
                    <button onClick={() => { isLoadingTemplateRef.current = true; setFormData(autoSaveData.data); setPromptType(autoSaveData.type); localStorage.removeItem('promptStudioAutosave'); showToast('Session restored!'); }}
                      className="px-5 py-2 bg-green-500/80 hover:bg-green-500 text-white rounded-lg border border-green-400/50 text-sm font-medium transition-colors">
                      🔄 Restore Last Session ({autoSaveData.type})
                    </button>
                  )}
                </div>
              </div>

              <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                {Object.entries(TYPE_META).map(([type, { icon, title, desc, color }]) => (
                  <button
                    key={type}
                    onClick={() => setPromptType(type)}
                    className={`p-8 rounded-2xl bg-gradient-to-br ${color} text-white text-left hover:scale-105 transition-transform shadow-xl`}
                  >
                    <div className="text-5xl mb-4">{icon}</div>
                    <h2 className="text-2xl font-bold mb-2">{title}</h2>
                    <p className="text-sm opacity-80">{desc}</p>
                  </button>
                ))}
                <button
                  onClick={() => setShowChain(true)}
                  className="p-8 rounded-2xl bg-gradient-to-br from-orange-500 to-pink-600 text-white text-left hover:scale-105 transition-transform shadow-xl"
                >
                  <div className="text-5xl mb-4">🔗</div>
                  <h2 className="text-2xl font-bold mb-2">Chain Builder</h2>
                  <p className="text-sm opacity-80">Multi-step pipelines · Plan → Build → Translate to any platform</p>
                </button>
              </div>

              {/* Hidden file input for template-library import */}
              <input
                ref={templateFileInputRef}
                type="file"
                accept="application/json,.json"
                className="hidden"
                onChange={e => { const f = e.target.files && e.target.files[0]; importTemplatesFromFile(f); e.target.value = ''; }}
              />

              {/* Empty-state import (restore a backup) */}
              {Object.keys(savedTemplates).length === 0 && (
                <div className="text-center">
                  <button onClick={() => templateFileInputRef.current && templateFileInputRef.current.click()} className="text-purple-200 text-sm hover:text-white underline">
                    ⬆ Import templates from a file
                  </button>
                </div>
              )}

              {/* Saved Templates */}
              {Object.keys(savedTemplates).length > 0 && (
                <div className="bg-white/10 backdrop-blur rounded-xl p-6">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-white font-semibold">📁 Saved Templates</h3>
                    <div className="flex gap-2">
                      <button onClick={exportAllTemplates} className="px-3 py-1 bg-white/10 text-white rounded text-sm hover:bg-white/20" title="Download all templates as a JSON file">⬇ Export all</button>
                      <button onClick={() => templateFileInputRef.current && templateFileInputRef.current.click()} className="px-3 py-1 bg-white/10 text-white rounded text-sm hover:bg-white/20" title="Import templates from a JSON file">⬆ Import</button>
                    </div>
                  </div>
                  <div className="grid gap-2">
                    {Object.entries(savedTemplates).map(([name, template]) => (
                      <div key={name} className="flex items-center justify-between bg-white/5 p-3 rounded-lg">
                        <div>
                          <span className="text-white font-medium">{name}</span>
                          <span className="text-purple-300 text-sm ml-2">({template.type})</span>
                        </div>
                        <div className="flex gap-2">
                          <button
                            onClick={() => { setTemplateViewMode('json'); setViewingTemplate({ name, template }); }}
                            className="px-3 py-1 bg-purple-500 text-white rounded text-sm hover:bg-purple-600"
                          >
                            View
                          </button>
                          <button
                            onClick={() => loadTemplate(name)}
                            className="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600"
                          >
                            Load
                          </button>
                          <button
                            onClick={() => deleteTemplate(name)}
                            className="px-3 py-1 bg-red-500/50 text-white rounded text-sm hover:bg-red-500"
                          >
                            Delete
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* View Template Modal */}
              {viewingTemplate && (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="view-template-title" onKeyDown={e => e.key === 'Escape' && setViewingTemplate(null)}>
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] overflow-hidden">
                    <div className="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex items-center justify-between">
                      <div>
                        <h3 id="view-template-title" className="text-lg font-bold dark:text-white">{viewingTemplate.name}</h3>
                        <p className="text-sm text-gray-600 dark:text-gray-300">Type: {viewingTemplate.template.type} · Saved: {new Date(viewingTemplate.template.savedAt).toLocaleDateString()}</p>
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 text-sm">
                          <button
                            onClick={() => setTemplateViewMode('json')}
                            className={`px-3 py-1 rounded-md font-medium transition-colors ${templateViewMode === 'json' ? 'bg-white dark:bg-gray-800 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-300 hover:text-gray-700'}`}
                          >
                            JSON
                          </button>
                          <button
                            onClick={() => setTemplateViewMode('text')}
                            className={`px-3 py-1 rounded-md font-medium transition-colors ${templateViewMode === 'text' ? 'bg-white dark:bg-gray-800 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-300 hover:text-gray-700'}`}
                          >
                            Plain Text
                          </button>
                        </div>
                        <button onClick={() => setViewingTemplate(null)} className="text-2xl hover:text-red-500 dark:text-gray-300" aria-label="Close">×</button>
                      </div>
                    </div>
                    <div className="overflow-auto max-h-[55vh] p-4">
                      <pre className="bg-gray-900 text-green-400 p-4 rounded-lg text-sm whitespace-pre-wrap">
                        {templateViewMode === 'json' ? buildNestedJSON(viewingTemplate.template.data) : jsonToPlainText(buildNestedJSON(viewingTemplate.template.data))}
                      </pre>
                    </div>
                    <div className="p-4 bg-gray-50 dark:bg-gray-700 border-t dark:border-gray-600 flex gap-2">
                      <button
                        onClick={async () => {
                          const content = templateViewMode === 'json' ? buildNestedJSON(viewingTemplate.template.data) : jsonToPlainText(buildNestedJSON(viewingTemplate.template.data));
                          const ok = await safeClipboardWrite(content);
                          if (ok) showToast(`${templateViewMode === 'json' ? 'JSON' : 'Plain text'} copied to clipboard!`);
                        }}
                        className="px-4 py-2 bg-gray-700 text-white rounded-lg hover:bg-gray-900 font-semibold"
                      >
                        {`📋 Copy ${templateViewMode === 'json' ? 'JSON' : 'Text'}`}
                      </button>
                      <button
                        onClick={() => { loadTemplate(viewingTemplate.name); setViewingTemplate(null); }}
                        className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
                      >
                        Load This Template
                      </button>
                      <button
                        onClick={() => setViewingTemplate(null)}
                        className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300"
                      >
                        Close
                      </button>
                    </div>
                  </div>
                </div>
              )}
              {/* Import Modal on home screen */}
              {showImport && (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="home-import-title" onKeyDown={e => e.key === 'Escape' && (setShowImport(false), setImportText(''), setImportError(''))}>
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden">
                    <div className="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex items-center justify-between">
                      <h3 id="home-import-title" className="text-xl font-bold dark:text-white">📂 Import JSON Prompt</h3>
                      <button onClick={() => { setShowImport(false); setImportText(''); setImportError(''); }} className="text-2xl hover:text-red-500 dark:text-gray-300" aria-label="Close">×</button>
                    </div>
                    <div className="p-4 space-y-3">
                      <p className="text-sm text-gray-600 dark:text-gray-400">Paste a previously exported JSON prompt. Select the prompt type first, then import to populate the form.</p>
                      <div className="flex flex-wrap gap-2">
                        {Object.entries(TYPE_META).map(([t, meta]) => (
                          <button key={t} onClick={() => setPromptType(t)}
                            className={`flex-1 min-w-[80px] py-2 rounded-lg text-sm font-medium border-2 transition-colors ${promptType === t ? 'border-blue-500 bg-blue-50 dark:bg-blue-950 text-blue-700 dark:text-blue-300' : 'border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-200'}`}>
                            {meta.icon} {meta.shortTitle}
                          </button>
                        ))}
                      </div>
                      <textarea
                        value={importText}
                        onChange={e => { setImportText(e.target.value); setImportError(''); }}
                        placeholder={'{\n  "role": {\n    "persona": "...",\n    "tone": "professional"\n  },\n  ...\n}'}
                        rows={12}
                        className="w-full p-3 border border-gray-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-blue-500 resize-none"
                      />
                      {importError && <p className="text-red-500 text-sm">{importError}</p>}
                    </div>
                    <div className="p-4 bg-gray-50 dark:bg-gray-700 border-t dark:border-gray-600 flex gap-2">
                      <button onClick={importJSON} disabled={!importText.trim() || !promptType}
                        className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold disabled:opacity-50">
                        Import & Open Builder
                      </button>
                      <button onClick={() => { setShowImport(false); setImportText(''); setImportError(''); }}
                        className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        Cancel
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // === BUILDER SCREEN ===
      const currentSectionKey = sections[currentSection];
      const currentSectionInfo = sectionInfo[currentSectionKey];
      const searchActive = fieldSearch.trim().length > 0;
      const searchLower = fieldSearch.trim().toLowerCase();
      const currentFields = searchActive
        ? Object.entries(schema).filter(([key, config]) => (config.label || '').toLowerCase().includes(searchLower) || key.toLowerCase().includes(searchLower))
        : Object.entries(schema).filter(([key, config]) => config.section === currentSectionKey);

      return (
        <div className="min-h-screen bg-gray-100 dark:bg-gray-900">
          {confirmModal}
          {/* Header */}
          <div className="bg-gradient-to-r from-purple-600 to-blue-600 text-white p-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-4">
                <button
                  onClick={async () => { if (!hasUnsavedChanges || (await confirmDialog('You have unsaved changes. Leave anyway?', { confirmLabel: 'Leave' }))) { setPromptType(null); setHasUnsavedChanges(false); } }}
                  className="p-2 hover:bg-white/20 rounded-lg"
                >
                  ← Back
                </button>
                <div>
                  <h1 className="text-xl font-bold">
                    {TYPE_META[promptType]?.icon} {TYPE_META[promptType]?.shortTitle} Prompt Builder
                  </h1>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {autoSaveStatus && <span className="text-xs text-white/60">{autoSaveStatus}</span>}
                <ThemeToggle mode={themeMode} setMode={setThemeMode} />
                <button
                  onClick={() => setShowImport(true)}
                  className="px-4 py-2 bg-white/20 text-white rounded-lg hover:bg-white/30 text-sm"
                >
                  📂 Import JSON
                </button>
                <select
                  key={presetKey}
                  onChange={e => e.target.value && applyPreset(e.target.value)}
                  className="bg-white/20 text-white border-0 rounded-lg p-2 text-sm"
                  defaultValue=""
                >
                  <option value="">Load Preset...</option>
                  {Object.keys(PRESETS[promptType] || {}).map(name => (
                    <option key={name} value={name}>{name}</option>
                  ))}
                </select>
                <button
                  onClick={() => setShowOutput(true)}
                  className="px-4 py-2 bg-white text-purple-600 rounded-lg font-semibold hover:bg-purple-100"
                >
                  Generate JSON →
                </button>
              </div>
            </div>
          </div>

          <div className="max-w-6xl mx-auto p-4 flex gap-4">
            {/* Sidebar */}
            <div className="w-64 flex-shrink-0">
              <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden sticky top-4">
                <div className="p-3 bg-gray-50 dark:bg-gray-700 border-b dark:border-gray-600 font-semibold text-gray-700 dark:text-gray-200">Sections</div>
                {sections.map((key, idx) => (
                  <button
                    key={key}
                    onClick={() => setCurrentSection(idx)}
                    className={`w-full p-3 text-left flex items-center gap-3 border-b dark:border-gray-600 last:border-0 transition-colors ${
                      idx === currentSection ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-50 dark:hover:bg-gray-700 dark:text-gray-200'
                    }`}
                  >
                    <span className="text-xl">{sectionInfo[key].icon}</span>
                    <div>
                      <div className="font-medium">{sectionInfo[key].title}</div>
                      <div className="text-xs text-gray-500 dark:text-gray-400">{sectionInfo[key].desc}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>

            {/* Main Content */}
            <div className="flex-1">
              <div className="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 fade-in" key={searchActive ? '__search' : currentSectionKey}>
                <div className="flex items-center justify-between gap-3 mb-6">
                  <div className="flex items-center gap-3">
                    <span className="text-3xl">{searchActive ? '🔍' : currentSectionInfo.icon}</span>
                    <div>
                      <h2 className="text-2xl font-bold text-gray-800 dark:text-white">{searchActive ? 'Search results' : currentSectionInfo.title}</h2>
                      <p className="text-gray-500 dark:text-gray-400">{searchActive ? `${currentFields.length} field${currentFields.length === 1 ? '' : 's'} matching "${fieldSearch.trim()}"` : currentSectionInfo.desc}</p>
                    </div>
                  </div>
                  <div className="relative">
                    <input
                      type="text"
                      value={fieldSearch}
                      onChange={e => setFieldSearch(e.target.value)}
                      placeholder="Search fields..."
                      className="w-44 sm:w-56 p-2 pr-7 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500"
                    />
                    {searchActive && (
                      <button onClick={() => setFieldSearch('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" aria-label="Clear search">×</button>
                    )}
                  </div>
                </div>

                {searchActive && currentFields.length === 0 && (
                  <p className="text-gray-500 dark:text-gray-400 text-sm">No fields match your search.</p>
                )}

                <div className="space-y-4">
                  {currentFields.map(([key, config]) => {
                    // Skip label + control entirely when the field's condition is unmet
                    if (config.condition && !formData[config.condition]) return null;
                    if (config.type === 'checkbox') {
                      return (
                        <div key={key}>
                          {renderField(key, config)}
                        </div>
                      );
                    }
                    const isComposite = ['multiselect', 'medium_aesthetics', 'industry_skills_picker'].includes(config.type);
                    return (
                      <div key={key}>
                        {isComposite ? (
                          <div role="group" aria-label={config.label} className="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">{config.label}</div>
                        ) : (
                          <label htmlFor={`field-${key}`} className="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">{config.label}</label>
                        )}
                        {renderField(key, config)}
                      </div>
                    );
                  })}
                </div>

                {/* Navigation (hidden while searching across sections) */}
                {!searchActive && (
                <div className="flex justify-between mt-8 pt-4 border-t dark:border-gray-600">
                  <button
                    onClick={() => setCurrentSection(Math.max(0, currentSection - 1))}
                    disabled={currentSection === 0}
                    className="px-4 py-2 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 disabled:opacity-50"
                  >
                    ← Previous
                  </button>
                  {currentSection < sections.length - 1 ? (
                    <button
                      onClick={() => setCurrentSection(currentSection + 1)}
                      className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                    >
                      Next →
                    </button>
                  ) : (
                    <button
                      onClick={() => setShowOutput(true)}
                      className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"
                    >
                      Generate JSON ✓
                    </button>
                  )}
                </div>
                )}
              </div>
            </div>
          </div>

          {/* Output Modal */}
          {showOutput && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="output-modal-title" onKeyDown={e => e.key === 'Escape' && setShowOutput(false)}>
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden">
                <div className="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex items-center justify-between">
                  <h3 id="output-modal-title" className="text-xl font-bold dark:text-white">Generated Prompt</h3>
                  <div className="flex items-center gap-3">
                    {/* JSON / Text toggle */}
                    <div className="flex bg-gray-200 dark:bg-gray-600 rounded-lg p-1 text-sm">
                      <button
                        onClick={() => setOutputMode('json')}
                        className={`px-3 py-1 rounded-md font-medium transition-colors ${outputMode === 'json' ? 'bg-white dark:bg-gray-800 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-300 hover:text-gray-700'}`}
                      >
                        JSON
                      </button>
                      <button
                        onClick={() => setOutputMode('text')}
                        className={`px-3 py-1 rounded-md font-medium transition-colors ${outputMode === 'text' ? 'bg-white dark:bg-gray-800 shadow text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-300 hover:text-gray-700'}`}
                      >
                        Plain Text
                      </button>
                    </div>
                    <button onClick={() => setShowOutput(false)} className="text-2xl hover:text-red-500 dark:text-gray-300" aria-label="Close">×</button>
                  </div>
                </div>

                <div className="p-4 space-y-4 overflow-auto max-h-[60vh]">
                  <pre className="bg-gray-900 text-green-400 p-4 rounded-lg text-sm overflow-auto whitespace-pre-wrap">
                    {outputMode === 'json' ? generatedJSON : generatedPlainText}
                  </pre>
                </div>

                <div className="p-4 bg-gray-50 dark:bg-gray-700 border-t dark:border-gray-600 space-y-4">
                  {/* Save Template */}
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={templateName}
                      onChange={e => setTemplateName(e.target.value)}
                      placeholder="Template name..."
                      className="flex-1 p-2 border rounded-lg"
                    />
                    <button
                      onClick={saveTemplate}
                      disabled={!templateName.trim()}
                      className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50"
                    >
                      💾 Save Template
                    </button>
                    <button
                      onClick={resetForm}
                      className="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500"
                      title="Reset all fields to defaults"
                    >
                      ↺ Reset
                    </button>
                  </div>

                  {/* Actions */}
                  <div className="flex gap-2">
                    <button
                      onClick={copyToClipboard}
                      className="flex-1 px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
                    >
                      {`📋 Copy ${outputMode === 'json' ? 'JSON' : 'Text'}`}
                    </button>
                    <button
                      onClick={exportToFile}
                      className="flex-1 px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold"
                    >
                      📥 Download {outputMode === 'json' ? 'JSON' : 'TXT'}
                    </button>
                  </div>

                  <p className="text-center text-sm text-gray-600 dark:text-gray-400">
                    Paste this {outputMode === 'json' ? 'JSON' : 'prompt'} into {TYPE_META[promptType]?.pasteTarget || 'your AI tool'}.
                  </p>
                </div>
              </div>
            </div>
          )}

          {/* Import JSON Modal */}
          {showImport && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" role="dialog" aria-modal="true" aria-labelledby="builder-import-title" onKeyDown={e => e.key === 'Escape' && (setShowImport(false), setImportText(''), setImportError(''))}>
              <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden">
                <div className="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex items-center justify-between">
                  <h3 id="builder-import-title" className="text-xl font-bold dark:text-white">📂 Import JSON Prompt</h3>
                  <button onClick={() => { setShowImport(false); setImportText(''); setImportError(''); }} className="text-2xl hover:text-red-500 dark:text-gray-300" aria-label="Close">×</button>
                </div>
                <div className="p-4 space-y-3">
                  <p className="text-sm text-gray-600 dark:text-gray-400">Paste a previously exported JSON prompt below. It will populate the current form fields.</p>
                  <textarea
                    value={importText}
                    onChange={e => { setImportText(e.target.value); setImportError(''); }}
                    placeholder={'{\n  "role": {\n    "persona": "...",\n    "tone": "professional"\n  },\n  ...\n}'}
                    rows={12}
                    className="w-full p-3 border border-gray-300 rounded-lg font-mono text-sm focus:ring-2 focus:ring-blue-500 resize-none"
                  />
                  {importError && <p className="text-red-500 text-sm">{importError}</p>}
                </div>
                <div className="p-4 bg-gray-50 dark:bg-gray-700 border-t dark:border-gray-600 flex gap-2">
                  <button
                    onClick={importJSON}
                    disabled={!importText.trim()}
                    className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold disabled:opacity-50"
                  >
                    Import & Populate Form
                  </button>
                  <button
                    onClick={() => { setShowImport(false); setImportText(''); setImportError(''); }}
                    className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <UniversalPromptStudio />
          <ToastContainer />
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
